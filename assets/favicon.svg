<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="#007AFF"/>
  <!-- White dot grid — 3×3 representing an app launcher / homescreen -->
  <circle cx="20" cy="20" r="5" fill="white" opacity="0.95"/>
  <circle cx="32" cy="20" r="5" fill="white" opacity="0.95"/>
  <circle cx="44" cy="20" r="5" fill="white" opacity="0.95"/>
  <circle cx="20" cy="32" r="5" fill="white" opacity="0.95"/>
  <circle cx="32" cy="32" r="5" fill="white" opacity="0.95"/>
  <circle cx="44" cy="32" r="5" fill="white" opacity="0.95"/>
  <circle cx="20" cy="44" r="5" fill="white" opacity="0.95"/>
  <circle cx="32" cy="44" r="5" fill="white" opacity="0.95"/>
  <circle cx="44" cy="44" r="5" fill="white" opacity="0.95"/>
</svg>
